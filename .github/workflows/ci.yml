name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run test suite
        run: python -m pytest

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run beta_core benchmark smoke test
        run: python -m modeltripwire.cli run-benchmark beta_core --config configs/default.yaml

      - name: Inspect recent runs
        run: python -m modeltripwire.cli list-runs --config configs/default.yaml

      - name: Upload benchmark outputs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-outputs
          path: outputs/latest/
          if-no-files-found: error
