<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission Control — System</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mission Control / System</h1>
      <p class="sub">Runtime and host health</p>
    </div>
    <nav class="navlinks">
      <a href="./">Overview</a>
      <a href="./agents.html">Agents</a>
      <a href="./approvals.html">Approvals</a>
    </nav>
  </header>
  <main class="layout single">
    <section class="panel full">
      <h2>System Status</h2>
      <div id="systemCard" class="rooms-grid"></div>
    </section>
  </main>
  <script>
    fetch('./data/system.json').then(r=>r.json()).then(data => {
      const s = data.system;
      const card = document.createElement('div');
      card.className = `card ${['healthy'].includes(s.overallStatus)?'good':(['warning'].includes(s.overallStatus)?'warn':'quiet')}`;
      card.innerHTML = `<div class="title">${s.hostLabel}</div><div class="meta"><span class="badge ${s.overallStatus}">${s.overallStatus}</span> • gateway: ${s.gatewayStatus}</div><div class="headline">Runtime: ${s.runtime}</div><div class="meta">Active jobs: ${s.activeJobCount} • Failing jobs: ${s.failingJobCount} • Warnings: ${s.warningCount}</div><div class="meta">Notes: ${(s.notes||[]).join(' | ') || '—'}</div>`;
      document.getElementById('systemCard').appendChild(card);
    });
  </script>
</body>
</html>
