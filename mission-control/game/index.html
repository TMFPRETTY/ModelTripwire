<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Mission Control</title>
  <link rel="stylesheet" href="../styles.css?v=20260323g" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Game Mission Control</h1>
      <p class="sub">Studio-side room-and-agent dashboard for the 2D isometric RPG</p>
    </div>
    <nav class="navlinks">
      <a href="./" class="active">Overview</a>
      <a href="./office.html">Office Mode</a>
    </nav>
    <div id="generatedAt" class="generated"></div>
  </header>

  <main class="layout">
    <section class="panel full">
      <h2>Studio Health</h2>
      <div class="stats" id="stats"></div>
    </section>

    <section class="panel full">
      <h2>Current Priorities</h2>
      <ul id="needsAttention" class="list"></ul>
    </section>

    <section class="panel wide">
      <h2>Game Rooms</h2>
      <div id="roomsGrid" class="rooms-grid"></div>
    </section>

    <section class="panel narrow">
      <h2>Recommended Focus</h2>
      <ul id="recommendedFocus" class="list"></ul>
    </section>

    <section class="panel wide">
      <h2>Studio Roles</h2>
      <div id="agentsGrid" class="agents-grid"></div>
    </section>

    <section class="panel narrow">
      <h2>Recent Activity</h2>
      <div id="activityFeed" class="feed"></div>
    </section>
  </main>

  <script src="./game-app.js"></script>
</body>
</html>
