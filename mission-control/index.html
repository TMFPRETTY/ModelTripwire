<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission Control</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mission Control</h1>
      <p class="sub">Room-and-agent dashboard for the live OpenClaw system</p>
    </div>
    <nav class="navlinks">
      <a href="./">Overview</a>
      <a href="./rooms.html">Rooms</a>
      <a href="./jobs.html">Jobs</a>
    </nav>
    <div id="generatedAt" class="generated"></div>
  </header>

  <main class="layout">
    <section class="panel full" id="healthPanel">
      <h2>Global Health</h2>
      <div class="stats" id="stats"></div>
    </section>

    <section class="panel full">
      <h2>Needs Attention</h2>
      <ul id="needsAttention" class="list"></ul>
    </section>

    <section class="panel wide">
      <h2>Room Status</h2>
      <div id="roomsGrid" class="rooms-grid"></div>
    </section>

    <section class="panel narrow">
      <h2>Recent Activity</h2>
      <div id="activityFeed" class="feed"></div>
    </section>

    <section class="panel wide">
      <h2>Jobs Health</h2>
      <table>
        <thead>
          <tr><th>Job</th><th>Room</th><th>Status</th><th>Last Run</th><th>Next Run</th></tr>
        </thead>
        <tbody id="jobsTable"></tbody>
      </table>
    </section>

    <section class="panel narrow">
      <h2>Alerts / Blockers</h2>
      <div id="alertsList" class="feed"></div>
    </section>

    <section class="panel narrow">
      <h2>Approvals Waiting</h2>
      <div id="approvalsList" class="feed"></div>
    </section>

    <section class="panel wide">
      <h2>Agents</h2>
      <div id="agentsGrid" class="agents-grid"></div>
    </section>

    <section class="panel narrow">
      <h2>Recommended Focus</h2>
      <ul id="recommendedFocus" class="list"></ul>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
