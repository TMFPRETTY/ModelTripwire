<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission Control — Rooms</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mission Control / Rooms</h1>
      <p class="sub">Room-by-room operational view</p>
    </div>
        <nav class="navlinks">
      <a href="./">Overview</a>
      <a href="./office.html">Office Mode</a>
      <a href="./rooms.html" class="active">Rooms</a>
      <a href="./jobs.html">Jobs</a>
      <a href="./agents.html">Agents</a>
      <a href="./approvals.html">Approvals</a>
      <a href="./system.html">System</a>
    </nav>
  </header>
  <main class="layout single">
    <section class="panel full">
      <h2>Rooms</h2>
      <div id="roomsGrid" class="rooms-grid"></div>
    </section>
  </main>
  <script>
    const statusClass = s => ['healthy','active','ok'].includes(s)?'good':(['warning'].includes(s)?'warn':(['blocked','failed','error'].includes(s)?'bad':'quiet'));
    const fmt = ts => ts ? new Date(ts).toLocaleString() : '—';
    fetch('./data/rooms.json').then(r=>r.json()).then(data => {
      const grid = document.getElementById('roomsGrid');
      data.rooms.forEach(room => {
        const card = document.createElement('a');
        card.href = `./room.html?id=${encodeURIComponent(room.id)}`;
        card.className = `card clickable ${statusClass(room.status)}`;
        card.innerHTML = `
          <div class="title">${room.name}</div>
          <div class="meta"><span class="badge ${room.status}">${room.status}</span> • ${room.kind}</div>
          <div class="headline">${room.headline}</div>
          <div class="meta">Last update: ${fmt(room.lastUpdateAt)}</div>
          <div class="meta">Agents: ${(room.agents||[]).join(', ') || '—'}</div>
          <div class="meta">Badges → approvals: ${room.badges?.approvals ?? 0}, alerts: ${room.badges?.alerts ?? 0}, queue: ${room.badges?.queue ?? 0}</div>
        `;
        grid.appendChild(card);
      });
    });
  </script>
</body>
</html>
