<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission Control — Approvals</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mission Control / Approvals</h1>
      <p class="sub">Things waiting on Jeremy</p>
    </div>
        <nav class="navlinks">
      <a href="./">Overview</a>
      <a href="./office.html">Office Mode</a>
      <a href="./rooms.html">Rooms</a>
      <a href="./jobs.html">Jobs</a>
      <a href="./agents.html">Agents</a>
      <a href="./approvals.html" class="active">Approvals</a>
      <a href="./system.html">System</a>
    </nav>
  </header>
  <main class="layout single">
    <section class="panel full">
      <h2>Approvals</h2>
      <table>
        <thead><tr><th>Title</th><th>Room</th><th>Risk</th><th>Decision</th><th>Requested</th><th>Summary</th></tr></thead>
        <tbody id="approvalsTable"></tbody>
      </table>
    </section>
  </main>
  <script>
    const fmt = ts => ts ? new Date(ts).toLocaleString() : '—';
    fetch('./data/approvals.json').then(r=>r.json()).then(data => {
      const table = document.getElementById('approvalsTable');
      const items = data.approvals.length ? data.approvals : [{title:'No approvals waiting', roomId:'—', risk:'low', decisionType:'—', requestedAt:null, summary:'Nothing is explicitly waiting on you right now.'}];
      items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${item.title}</td><td>${item.roomId || '—'}</td><td><span class="badge ${item.risk}">${item.risk}</span></td><td>${item.decisionType || '—'}</td><td>${fmt(item.requestedAt)}</td><td>${item.summary || '—'}</td>`;
        table.appendChild(tr);
      });
    });
  </script>
</body>
</html>
